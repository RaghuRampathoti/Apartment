spring.application.name=apartment-management-system
server.port=${PORT:8080}

spring.config.import=optional:file:.env[.properties]

# ===============================
# DATABASE CONFIG (POSTGRESQL)
# ===============================

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/ams_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:1441}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SECURITY LOGGING
# ===============================
logging.level.org.springframework.security=INFO

# ===============================
# CLOUDINARY CONFIG
# ===============================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# BREVO MAIL CONFIG
# ===============================
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${MAIL_USERNAME}

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:ThisIsVerySecretKeyForJwtApartmentSystem123456789}
jwt.expiration=3600000

# ===============================
# FRONTEND URL
# ===============================
app.frontend.url=${FRONTEND_URL}

